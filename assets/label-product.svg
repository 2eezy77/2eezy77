<svg xmlns="http://www.w3.org/2000/svg" width="86" height="24" viewBox="0 0 86 24">
  <defs>
    <filter id="g" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="86" height="24" rx="6" fill="#422006" stroke="#fbbf24" stroke-width="1.5" filter="url(#g)">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  <circle cx="12" cy="12" r="3" fill="#fbbf24">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="50" y="16" text-anchor="middle" fill="#fde68a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700">product</text>
</svg>

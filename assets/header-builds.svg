<svg xmlns="http://www.w3.org/2000/svg" width="420" height="48" viewBox="0 0 420 48" role="img" aria-label="Featured builds">
  <defs>
    <linearGradient id="h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#fbbf24">
        <animate attributeName="stop-color" values="#fbbf24;#67e8f9;#fbbf24" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="g" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="18" width="8" height="20" rx="2" fill="#22d3ee" filter="url(#g)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/>
  </rect>
  <text x="20" y="34" fill="url(#h)" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="800" filter="url(#g)">Featured builds</text>
</svg>

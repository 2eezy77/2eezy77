<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="Software systems, products, realtime 3D">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1220">
        <animate attributeName="stop-color" values="#0a1220;#0d1a2e;#0a1220" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="45%" stop-color="#102538">
        <animate attributeName="stop-color" values="#102538;#143048;#102538" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0c1f2a">
        <animate attributeName="stop-color" values="#0c1f2a;#0e2835;#0c1f2a" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glowA" cx="22%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a4c"/>
      <stop offset="100%" stop-color="#132433"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="18" fill="url(#glowA)"/>
  <rect width="1200" height="280" rx="18" fill="url(#glowB)"/>

  <g opacity="0.14" stroke="#67e8f9" stroke-width="1">
    <path d="M40 60 H1160 M40 100 H1160 M40 140 H1160 M40 180 H1160 M40 220 H1160"/>
    <path d="M80 40 V240 M160 40 V240 M240 40 V240 M320 40 V240 M400 40 V240 M480 40 V240 M560 40 V240 M640 40 V240 M720 40 V240 M800 40 V240 M880 40 V240 M960 40 V240 M1040 40 V240 M1120 40 V240"/>
  </g>

  <g fill="#22d3ee">
    <circle cx="180" cy="70" r="3.5" opacity="0.7">
      <animate attributeName="cy" values="70;58;70" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="90" r="3" opacity="0.65">
      <animate attributeName="cy" values="90;78;90" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="190" r="2.5" opacity="0.55">
      <animate attributeName="cy" values="190;175;190" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="210" r="2.8" opacity="0.5">
      <animate attributeName="cy" values="210;198;210" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g stroke="#22d3ee" stroke-width="1.2" opacity="0.25" fill="none">
    <path d="M180 70 C320 40, 420 120, 520 95">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M980 90 C900 140, 860 120, 820 160">
      <animate attributeName="opacity" values="0.12;0.35;0.12" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(880,55)">
    <g>
      <polygon points="70,40 110,18 150,40 110,62" fill="url(#cubeTop)" opacity="0.95"/>
      <polygon points="70,40 110,62 110,110 70,88" fill="url(#cubeLeft)"/>
      <polygon points="110,62 150,40 150,88 110,110" fill="url(#cubeRight)"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="4.2s" repeatCount="indefinite"/>
    </g>
    <g opacity="0.9">
      <polygon points="20,95 52,78 84,95 52,112" fill="url(#cubeTop)"/>
      <polygon points="20,95 52,112 52,148 20,131" fill="url(#cubeLeft)"/>
      <polygon points="52,112 84,95 84,131 52,148" fill="url(#cubeRight)"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="5s" begin="0.6s" repeatCount="indefinite"/>
    </g>
    <g opacity="0.85">
      <polygon points="130,105 158,90 186,105 158,120" fill="url(#cubeTop)"/>
      <polygon points="130,105 158,120 158,150 130,135" fill="url(#cubeLeft)"/>
      <polygon points="158,120 186,105 186,135 158,150" fill="url(#cubeRight)"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="4.8s" begin="1.1s" repeatCount="indefinite"/>
    </g>
  </g>

  <g transform="translate(620,48)">
    <g>
      <rect x="0" y="20" width="150" height="90" rx="12" fill="url(#cardFace)" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.5"/>
      <rect x="16" y="38" width="70" height="8" rx="4" fill="#22d3ee" opacity="0.55"/>
      <rect x="16" y="56" width="110" height="6" rx="3" fill="#94a3b8" opacity="0.35"/>
      <rect x="16" y="70" width="90" height="6" rx="3" fill="#94a3b8" opacity="0.25"/>
      <circle cx="128" cy="42" r="6" fill="#38bdf8" opacity="0.7">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="5.5s" repeatCount="indefinite"/>
    </g>
    <g opacity="0.75">
      <rect x="40" y="95" width="120" height="70" rx="10" fill="#122433" stroke="#38bdf8" stroke-opacity="0.28" stroke-width="1.2"/>
      <rect x="54" y="112" width="50" height="6" rx="3" fill="#38bdf8" opacity="0.45"/>
      <rect x="54" y="128" width="85" height="5" rx="2.5" fill="#64748b" opacity="0.35"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="6.2s" begin="0.8s" repeatCount="indefinite"/>
    </g>
  </g>

  <text x="56" y="108" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="700">Software systems / products / realtime 3D</text>
  <text x="56" y="148" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18">Full-stack products, systems tooling, and 3D pipelines</text>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#67e8f9">
    <text x="56" y="188" opacity="0">Building production apps and hardened pipelines
      <animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.05;0.28;0.33;0.66;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="56" y="188" opacity="0">React / Node / Python / sockets / parallel compute
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.38;0.61;0.66;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="56" y="188" opacity="0">OpenUSD / Cesium / WebGL / geospatial viz
      <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.66;0.71;0.75;0.95;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect x="56" y="212" width="180" height="4" rx="2" fill="#22d3ee" opacity="0.85">
    <animate attributeName="width" values="180;240;180" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="56" y="212" width="60" height="4" rx="2" fill="#fbbf24" opacity="0.9">
    <animate attributeName="x" values="56;176;56" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>

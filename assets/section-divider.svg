<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="28" viewBox="0 0 1200 28" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="25%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="75%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
      <animate attributeName="x1" values="0%;30%;0%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;130%;100%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect y="11" width="1200" height="6" rx="3" fill="url(#d)" filter="url(#g)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <circle cy="14" r="5" fill="#fbbf24" filter="url(#g)">
    <animate attributeName="cx" values="80;1120;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cy="14" r="3.5" fill="#22d3ee" filter="url(#g)">
    <animate attributeName="cx" values="1120;80;1120" dur="6.5s" repeatCount="indefinite"/>
  </circle>
</svg>
